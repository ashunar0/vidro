<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vidro router demo</title>
    <style>
      /* aria-current="page" の Link を強調表示。Vidro Link は class ではなく
         aria-current で active 表現する (a11y standard、命名衝突回避)。 */
      nav a[aria-current="page"] {
        font-weight: bold;
        text-decoration: underline;
        color: #06c;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!--
      ADR 0036: bundle を `async` で並列 download。`type="module"` の default
      は defer (= DOMContentLoaded 待ち) だが、async を付けると parse-blocking
      なしで load 完了次第 register する経路に。shell flush 直後の boot trigger
      (core/render-to-string.ts VIDRO_BOOT_TRIGGER) と組み合わせて、shell が
      DOM に乗った瞬間 hydrate を起動できるようにする。
    -->
    <script type="module" async src="/src/main.tsx"></script>
  </body>
</html>
