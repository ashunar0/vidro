name = "vidro-tutorial"
# @cloudflare/vite-plugin が source を直接読み、dev では workerd in-process、
# prod では vite build が worker bundle を生成する。main は source を指す。
main = "./.vidro/server-entry.ts"
compatibility_date = "2026-04-17"

[assets]
# build output を .vidro/build/{client,ssr}/ に集約 (ADR 0043)。
directory = "./.vidro/build/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true
