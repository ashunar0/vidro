packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@babel/generator": ^7.29.1
  "@babel/parser": ^7.29.2
  "@babel/traverse": ^7.29.0
  "@babel/types": ^7.29.0
  "@cloudflare/vite-plugin": ^1.34.0
  "@tailwindcss/vite": ^4.2.4
  "@types/babel__generator": ^7.27.0
  "@types/babel__traverse": ^7.28.0
  "@types/node": ^24
  jsdom: ^29.0.2
  tailwindcss: ^4.2.4
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
  # vite-plus alpha 期間中の dedup hack。CF plugin が transitive に古い
  # vite-plus-core (0.1.19) を引き込み、`vite: npm:vite-plus-core@latest` の
  # 解決と path 違いで TS が `Plugin<any>[]` を別型扱いし `tsc -b` が
  # "Excessive stack depth" を起こしていた。stable 後は撤去できる (ADR 0045)。
  "@voidzero-dev/vite-plus-core": "0.1.20"
  "@voidzero-dev/vite-plus-test": "0.1.20"
  "vite-plus": "0.1.20"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
