packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@babel/generator": ^7.29.1
  "@babel/parser": ^7.29.2
  "@babel/traverse": ^7.29.0
  "@babel/types": ^7.29.0
  "@cloudflare/vite-plugin": ^1.34.0
  "@tailwindcss/vite": ^4.2.4
  "@types/babel__generator": ^7.27.0
  "@types/babel__traverse": ^7.28.0
  "@types/node": ^24
  jsdom: ^29.0.2
  tailwindcss: ^4.2.4
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
